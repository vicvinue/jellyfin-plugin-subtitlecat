name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set assembly version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          ASMVER="${VERSION}.0"
          sed -i "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>${ASMVER}</AssemblyVersion>|" Jellyfin.Plugin.SubtitleCat.csproj
          sed -i "s|<FileVersion>.*</FileVersion>|<FileVersion>${ASMVER}</FileVersion>|" Jellyfin.Plugin.SubtitleCat.csproj
          sed -i "s|<Version>.*</Version>|<Version>${VERSION}</Version>|" Jellyfin.Plugin.SubtitleCat.csproj

      - name: Build
        run: dotnet build -c Release

      - name: Prepare plugin zip
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          REPO=${{ github.repository }}
          mkdir -p dist
          cp bin/Release/net9.0/Jellyfin.Plugin.SubtitleCat.dll dist/
          cp icon.png dist/
          # Update meta.json with correct version and repositoryUrl
          python3 - <<EOF
          import json
          with open('meta.json') as f:
              meta = json.load(f)
          meta['version'] = '${VERSION}'
          meta['repositoryUrl'] = 'https://raw.githubusercontent.com/${REPO}/main/manifest.json'
          with open('dist/meta.json', 'w') as f:
              json.dump(meta, f, indent=2)
          EOF
          cd dist && zip -j ../Jellyfin.Plugin.SubtitleCat_${VERSION}.zip ./*

      - name: Compute checksum
        id: checksum
        run: |
          MD5=$(md5sum Jellyfin.Plugin.SubtitleCat_${{ steps.version.outputs.VERSION }}.zip | awk '{print $1}')
          echo "MD5=$MD5" >> $GITHUB_OUTPUT

      - name: Update manifest.json
        run: |
          python3 - <<'EOF'
          import json, os
          version = os.environ['VERSION']
          md5 = os.environ['MD5']
          repo = os.environ['GITHUB_REPOSITORY']
          url = f"https://github.com/{repo}/releases/download/v{version}/Jellyfin.Plugin.SubtitleCat_{version}.zip"

          with open('manifest.json') as f:
              manifest = json.load(f)

          new_version = {
              "checksum": md5,
              "changelog": f"Release {version}",
              "targetAbi": "10.11.0.0",
              "sourceUrl": url,
              "timestamp": "2026-05-14T00:00:00Z",
              "version": version
          }

          manifest[0]["guid"] = "b3c4d5e6-f7a8-9012-cdef-012345678901"
          manifest[0]["name"] = "SubMichi"
          manifest[0]["owner"] = "vicvinue"
          manifest[0]["imageUrl"] = f"https://raw.githubusercontent.com/{repo}/main/icon.png"

          manifest[0]['versions'].insert(0, new_version)

          with open('manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          EOF
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          MD5: ${{ steps.checksum.outputs.MD5 }}

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Update manifest for v${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Jellyfin.Plugin.SubtitleCat_${{ steps.version.outputs.VERSION }}.zip
          body: |
            ## SubtitleCat Plugin v${{ steps.version.outputs.VERSION }}

            ### Instalación
            Agrega el repositorio en Jellyfin → Panel de control → Complementos → Repositorios:
            `https://raw.githubusercontent.com/vicvinue/jellyfin-plugin-subtitlecat/main/manifest.json`

            O descarga el zip y extrae en la carpeta de plugins de Jellyfin:
            `<JellyfinData>/plugins/SubtitleCat_${{ steps.version.outputs.VERSION }}.0/`
